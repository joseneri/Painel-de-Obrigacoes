name: painel-obrigacoes-dev

services:
  db:
    image: postgres:16
    container_name: painel-obrigacoes-dev-db
    environment:
      POSTGRES_DB: painel_obrigacoes
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d painel_obrigacoes"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
