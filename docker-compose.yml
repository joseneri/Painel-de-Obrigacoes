name: painel-obrigacoes

services:
  db:
    image: postgres:16
    container_name: painel-obrigacoes-db
    environment:
      POSTGRES_DB: painel_obrigacoes
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d painel_obrigacoes"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - painel

  api:
    build:
      context: .
      dockerfile: backend/src/Api/Dockerfile
    container_name: painel-obrigacoes-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Host=db;Port=5432;Database=painel_obrigacoes;Username=postgres;Password=postgres
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - painel

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080
    container_name: painel-obrigacoes-frontend
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8081:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - painel

volumes:
  postgres_data:

networks:
  painel:
    driver: bridge
